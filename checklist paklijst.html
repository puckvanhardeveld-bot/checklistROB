<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festival Checklist BMT & VWT</title>

<style>
body {font-family: Arial; margin:0; background:#f5f7fb;}
header {background:#66C6DA; color:white; padding:15px; text-align:center;}

.tabs {display:flex;}
.tab {flex:1; padding:12px; background:#e5e7eb; text-align:center; cursor:pointer;}
.tab.active {background:white; font-weight:bold;}

.container {padding:15px;}

.category {
  background:white;
  margin-bottom:15px;
  padding:10px;
  border-radius:10px;
  border:2px solid #e5e7eb;
  transition:0.3s;
}

.category.done {
  background:#ecfdf5;
  border-color:#22c55e;
}

.title {font-weight:bold; margin-bottom:8px;}

.item {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:4px 0;
}

.left {
  display:flex;
  align-items:center;
  gap:10px;
}

.qty {
  color:gray;
  font-size:12px;
}

button {
  width:100%;
  padding:12px;
  border:none;
  margin-top:10px;
  border-radius:8px;
  font-size:16px;
}

.reset {background:#ef4444; color:white;}
.qr {background:#111827; color:white;}

#qrBox {text-align:center; margin-top:10px;}
</style>
</head>

<body>

<header>Festival Checklist BMT & VWT</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('bmt')">BMT</div>
  <div class="tab" onclick="switchTab('vwt')">VWT</div>
</div>

<div class="container" id="content"></div>

<button class="reset" onclick="resetAll()">Reset</button>
<button class="qr" onclick="generateQR()">QR Code</button>

<div id="qrBox"></div>

<script>

["Grote pannenlikker", "1x"],

["Oliefles", "2x"],

["Vergiet", "2x"]
],

vwt: {
"Apparatuur & Werkmateriaal": [

["Koelwerkbank", "2x"],

["Trap", "1x"],
["Koelkast", "1x"],
["Rijstkoker", "3x"],

["Magnetron", "1x"],

["Zwarte warmhoudbox", "2x"],
["Pellets", "3x"],
["Aluminium houders", "2x"],

],

"Keukengerei": [

["Schaar", "3x"],

],

"Schoonmaak": [

["Afwasmiddel", "1x"],
["Desinfectie", "1x"],
["Handdoek", "12x"]
],

"Afval": [

["Vuilnisbakken", "3x"]
]
}
};

let current = "bmt";

/* =========================
   OPSLAG
========================= */

function getSaved(){
  return JSON.parse(localStorage.getItem("checklist") || "{}");
}

function save(data){
  localStorage.setItem("checklist", JSON.stringify(data));
}

/* =========================
   RENDER
========================= */

function render(){
  const saved = getSaved();
  const box = document.getElementById("content");
  box.innerHTML = "";

  Object.keys(data[current]).forEach(cat => {

    const items = data[current][cat];
    let done = 0;

    let div = document.createElement("div");
    div.className = "category";

    let html = `<div class="title">${cat}</div>`;

    items.forEach(item => {
      const key = current + cat + item[0];

      if(saved[key]) done++;

      html += `
      <div class="item">
        <div class="left">
          <input type="checkbox" ${saved[key] ? "checked":""}
          onchange="toggle('${key}')">
          <div>${item[0]}</div>
        </div>
        <div class="qty">${item[1]}</div>
      </div>`;
    });

    div.innerHTML = html;

    if(done === items.length) div.classList.add("done");

    box.appendChild(div);
  });
}

/* =========================
   TOGGLE
========================= */

function toggle(key){
  let saved = getSaved();
  saved[key] = !saved[key];
  save(saved);
  render();
}

/* =========================
   TAB
========================= */

function switchTab(tab){
  current = tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

/* =========================
   RESET
========================= */

function resetAll(){
  localStorage.removeItem("checklist");
  render();
}

/* =========================
   QR
========================= */

function generateQR(){
  const url = window.location.href;

  document.getElementById("qrBox").innerHTML =
  `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}">
   <div>Scan op je telefoon</div>`;
}

render();

</script>

</body>
</html>
